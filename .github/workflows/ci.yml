name: ci

on:
  pull_request:
    branches: [develop, main, release/**]
  push:
    branches: [develop, main, release/**]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Git hook parity
        run: |
          git ls-files | python scripts/git_hooks/check_paths.py
          printf '%s\n' 'feat: ci hook parity' > /tmp/vbinvest-good-commit-msg.txt
          python scripts/git_hooks/check_commit_msg.py /tmp/vbinvest-good-commit-msg.txt
          python - <<'PY'
          from scripts.git_hooks.check_pre_push import EXPECTED_ORIGIN_URL, validate_branch_name, validate_origin_url

          checks = [
              validate_origin_url(EXPECTED_ORIGIN_URL),
              validate_branch_name("develop"),
              validate_branch_name("release/v0.1.0"),
          ]
          failures = [check.message for check in checks if not check.ok]
          if failures:
              raise SystemExit("\n".join(failures))
          print("pre_push_policy=ok")
          PY
      - name: Backend tests
        run: python -m pytest -q
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Frontend unit tests
        working-directory: frontend
        run: npm test -- --run
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Launcher and package smoke
        run: |
          make launcher-smoke
          make package-smoke
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e
        working-directory: frontend
        run: npx playwright test e2e/chart.spec.ts --project=chromium
  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vbinvest
          POSTGRES_USER: vbinvest
          POSTGRES_PASSWORD: vbinvest_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vbinvest -d vbinvest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Migration smoke
        env:
          PGPASSWORD: vbinvest_test_password
        run: |
          for file in postgres/init/*.sql; do
            psql -h 127.0.0.1 -U vbinvest -d vbinvest -v ON_ERROR_STOP=1 -f "$file"
          done
